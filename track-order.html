<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order - LuminaStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top border-bottom">
        <div class="container">
            <a class="navbar-brand" href="index.html">Lumina<span>Store</span></a>
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMain">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Shop</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
                <div class="nav-icons d-flex align-items-center ms-lg-4 gap-2 mt-3 mt-lg-0">
                    <a href="cart.html" class="btn"><i class="fas fa-shopping-bag"></i><span class="badge">2</span></a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Track Order Section -->
    <section class="py-5 bg-light min-vh-100 d-flex align-items-center">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-lg-6 col-md-8">
                    <div class="bg-white p-5 rounded-4 shadow-sm border text-center">
                        <div class="mb-4 text-warning" style="font-size: 3rem;">
                            <i class="fas fa-box-open"></i>
                        </div>
                        <h2 class="fw-bold mb-3">Track Your Order</h2>
                        <p class="text-muted mb-4">Enter your order ID and billing email address below to track your shipment status.</p>
                        
                        <form>
                            <div class="mb-3 text-start">
                                <label class="form-label text-muted small fw-semibold">Order ID</label>
                                <input type="text" class="form-control px-4 py-3 bg-light border-0" placeholder="e.g. LMN-12345678" required>
                            </div>
                            <div class="mb-4 text-start">
                                <label class="form-label text-muted small fw-semibold">Billing Email</label>
                                <input type="email" class="form-control px-4 py-3 bg-light border-0" placeholder="Email you used during checkout" required>
                            </div>
                            <button type="submit" class="btn btn-dark w-100 py-3 rounded-pill fw-bold">Track Order <i class="fas fa-arrow-right ms-2"></i></button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer mt-0 text-center py-4 bg-dark text-white">
        <p class="mb-0">&copy; 2026 LuminaStore. All Rights Reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
